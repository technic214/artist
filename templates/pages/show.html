{% extends 'layouts/main.html' %}
{% block title %}Shows{% endblock %}
{% block content %}
  <h3>Upcoming Shows</h3>
  <ul>
    {% for show in shows %}
      <li>
        <strong>Venue:</strong> {{ show.venue_name }}<br>
        <strong>Artist:</strong> {{ show.artist_name }}<br>
        <strong>Start Time:</strong> {{ show.start_time }}<br>
        <img src="{{ show.artist_image_link }}" alt="Artist Image" style="width:100px;">
      </li>
    {% endfor %}
  </ul>
{% endblock %}
